name: Build APK
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # Upgrade from @v4 to @v5+ for Node 24 support
        uses: actions/checkout@v5 

      - name: Set up JDK 17
        # Upgrade from @v4 to @v5 for Node 24 support
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        # Upgrade from @v3 to @v4+ (v6 is latest for modern features)
        uses: gradle/actions/setup-gradle@v4
        
      - name: Build with Gradle
        run: gradle assembleDebug --stacktrace > build_log.txt 2>&1
          
      - name: Upload APK Artifact
        # Already on @v4, which is compatible
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

     
